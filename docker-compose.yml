services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: agent_name
      POSTGRES_PASSWORD: agent_password
      POSTGRES_DB: supplier_agent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_name -d supplier_agent"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://agent_name:agent_password@db:5432/supplier_agent
      SECRET_KEY: secret_for_testing
    volumes:
      - ./uploads:/app/uploads
      - ./migrations:/app/migrations
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: